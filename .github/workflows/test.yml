# Test gate: luacheck + the full Tests/run.lua suite (issue #2 follow-up, FND-022).
name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Luacheck
        run: luacheck Foundry.lua Modules --no-color

      - name: Run test suite
        run: lua Tests/run.lua
