name: Wago Upload (manual)

# Recovery tool: re-run ONLY the Wago upload for an already-released tag.
# Exists because release.yml is a single job — "re-run failed jobs" would also
# re-run the CurseForge upload, and CF accepts duplicate files for the same
# version (the FND-015 failure mode). Dispatch from main with the tag as input
# (dispatching on the tag ref itself only works if the tag contains this file).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to re-publish to Wago (e.g. v1.0.101)'
        required: true
        type: string
      wago_id:
        description: 'Override the TOC X-Wago-ID (for tags carrying a stale project id)'
        required: false
        type: string
        default: ''

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  wago:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the requested tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate the tag
        run: |
          TAG="${{ inputs.tag }}"
          case "$TAG" in
            v*) ;;
            *) echo "::error::'$TAG' is not a v* tag."; exit 1 ;;
          esac
          if [ "$(git describe --tags --exact-match 2>/dev/null)" != "$TAG" ]; then
            echo "::error::Checked-out commit is not exactly tag $TAG."
            exit 1
          fi

      # Same extraction as release.yml so the packaged changelog matches what
      # CurseForge got for this version.
      - name: Extract and convert current version changelog
        run: |
          awk '/^## \[[0-9]/{if(found) exit; found=1} found' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::RELEASE_NOTES.md is empty after extraction."
            exit 1
          fi
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if ! head -1 RELEASE_NOTES.md | grep -q "\[${TAG_VERSION}\]"; then
            echo "::error::Extracted notes don't match ${{ inputs.tag }}; is the CHANGELOG entry missing?"
            exit 1
          fi
          if ! command -v pandoc &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y pandoc
          fi
          pandoc --wrap=none -f commonmark -t html RELEASE_NOTES.md -o RELEASE_NOTES.html

      - name: Package and Release — Wago only
        uses: BigWigsMods/packager@v2
        with:
          args: -p 0 ${{ inputs.wago_id != '' && format('-a {0}', inputs.wago_id) || '' }}
        env:
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
